<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人工智能训练师题库检索</title>
<style>
  :root{
    --bg:#f5f6f8;--card:#fff;--border:#e6e8ec;--ink:#1f2329;
    --muted:#8a9099;--accent:#2563eb;--accent-soft:#eff4ff;
    --theory:#0f9d58;--theory-soft:#e8f6ef;--prac:#e8740c;--prac-soft:#fdf0e3;
    --mark:#fff2a8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  header.top{
    position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--border);
  }
  .top-inner{max-width:920px;margin:0 auto;padding:16px 20px 14px}
  .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
  .brand .sub{font-size:12.5px;color:var(--muted)}
  .search-wrap{position:relative;margin-top:12px}
  .search-wrap svg.si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
  #q{
    width:100%;font-size:16px;padding:12px 42px 12px 42px;border:1px solid var(--border);
    border-radius:10px;background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s;
  }
  #q:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .clear-btn{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:transparent;
    cursor:pointer;color:var(--muted);padding:6px;border-radius:6px;display:none;font-size:18px;line-height:1;
  }
  .clear-btn:hover{background:#eef0f3;color:var(--ink)}
  .filters{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .seg{display:inline-flex;background:#eef0f3;border-radius:8px;padding:3px}
  .seg button{
    border:none;background:transparent;padding:6px 14px;font-size:13.5px;border-radius:6px;cursor:pointer;
    color:var(--muted);font-weight:500;transition:all .12s;
  }
  .seg button.active{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .seg button .cnt{font-size:11px;color:var(--muted);margin-left:3px}
  .seg button.active .cnt{color:var(--accent)}
  #setSeg button{padding:6px 10px;font-variant-numeric:tabular-nums}
  .flabel{font-size:12px;color:var(--muted);align-self:center}
  .sub-pills{display:inline-flex;gap:6px;flex-wrap:wrap}
  .pill{
    border:1px solid var(--border);background:var(--card);padding:4px 11px;font-size:12.5px;border-radius:999px;
    cursor:pointer;color:var(--muted);transition:all .12s;
  }
  .pill:hover{border-color:#cfd3da}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .spacer{flex:1}
  .result-count{font-size:12.5px;color:var(--muted)}
  main{max-width:920px;margin:0 auto;padding:18px 20px 60px}
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:10px;padding:15px 17px;margin-bottom:12px;
    transition:box-shadow .15s,border-color .15s;
  }
  .card:hover{box-shadow:0 2px 10px rgba(0,0,0,.05);border-color:#dadde2}
  .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px}
  .badge{font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:5px;line-height:1.5}
  .badge.theory{background:var(--theory-soft);color:var(--theory)}
  .badge.prac{background:var(--prac-soft);color:var(--prac)}
  .badge.sec{background:#eef0f3;color:#5a6068;font-weight:500}
  .badge.num{background:#f0f1f4;color:#5a6068;font-weight:600;font-variant-numeric:tabular-nums}
  .badge.set{background:#eaeefb;color:#3b5bdb;font-weight:600;font-variant-numeric:tabular-nums}
  .src{font-size:11.5px;color:var(--muted);margin-left:auto}
  .card h3.title{font-size:15.5px;margin:0 0 8px;font-weight:600;line-height:1.45}
  .content{font-size:14.5px;white-space:pre-wrap;word-break:break-word;color:#33373d}
  mark{background:var(--mark);color:inherit;border-radius:2px;padding:0 1px}
  .ans{color:#dc2626;text-decoration:underline;text-underline-offset:2px;text-decoration-color:#dc2626;font-weight:500}
  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty svg{display:block;margin:0 auto 14px;opacity:.5}
  .empty .big{font-size:15px;margin-bottom:4px;color:#5a6068}
  .empty .hint{font-size:13px}
  .kbd{font:11px ui-monospace,monospace;background:#eef0f3;border:1px solid var(--border);border-bottom-width:2px;border-radius:4px;padding:1px 5px}
  footer{max-width:920px;margin:0 auto;padding:0 20px 40px;font-size:12px;color:var(--muted);text-align:center}
  @media(max-width:560px){
    .top-inner{padding:13px 14px 11px}
    main{padding:14px 14px 50px}
    #q{font-size:15px}
    .src{margin-left:0;width:100%}
  }
</style>
</head>

</header>

const APP_DATA = {"generated_at":"2026-06-24 15:16","source_count":10,"items":[{"type":"theory","set":1,"section":"单项选择题","number":1,"content":"职业道德是从事一定职业的人们在职业活动过程中所应遵循的道德原则和行为规范的总和。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"职业道德是从事一定职业的人们在职业活动过程中所应遵循的道德原则和行为规范的总和。"},{"type":"theory","set":1,"section":"单项选择题","number":2,"content":"职业道德的鲜明职业性特征反映各行各业的职业特点，鲜明地表达着职业义务、责任以及行为上的道德准则。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"职业道德的鲜明职业性特征反映各行各业的职业特点，鲜明地表达着职业义务、责任以及行为上的道德准则。"},{"type":"theory","set":1,"section":"单项选择题","number":3,"content":"职业道德在企业文化中占据重要地位，而职工是企业的主体，因此企业文化必须以企业职工为中介。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"职业道德在企业文化中占据重要地位，而职工是企业的主体，因此企业文化必须以企业职工为中介。"},{"type":"theory","set":1,"section":"单项选择题","number":4,"content":"一台计算机的主机组成的部件不包含操作系统。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"一台计算机的主机组成的部件不包含操作系统。"},{"type":"theory","set":1,"section":"单项选择题","number":5,"content":"单处理机计算机系统中，处理机操作和通道操作是并行操作的。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"单处理机计算机系统中，处理机操作和通道操作是并行操作的。"},{"type":"theory","set":1,"section":"单项选择题","number":6,"content":"计算机网络的主要功能目的是实现计算机之间的资源共享，网络资源共享不属于资源共享。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"计算机网络的主要功能目的是实现计算机之间的资源共享，网络资源共享不属于资源共享。"},{"type":"theory","set":1,"section":"单项选择题","number":7,"content":"计算机安全所涵盖的内容从技术上不包括用电安全。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"计算机安全所涵盖的内容从技术上不包括用电安全。"},{"type":"theory","set":1,"section":"单项选择题","number":8,"content":"数据库减少了数据冗余。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据库减少了数据冗余。"},{"type":"theory","set":1,"section":"单项选择题","number":9,"content":"人工智能训练师的主要工作是训练和优化机器学习模型。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"人工智能训练师的主要工作是训练和优化机器学习模型。"},{"type":"theory","set":1,"section":"单项选择题","number":10,"content":"在机器学习中，数据预处理的目的是提高模型的准确性。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在机器学习中，数据预处理的目的是提高模型的准确性。"},{"type":"theory","set":1,"section":"单项选择题","number":11,"content":"输入/输出接口不是监督学习算法。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"输入/输出接口不是监督学习算法。"},{"type":"theory","set":1,"section":"单项选择题","number":12,"content":"数据分类不属于数据预处理方法。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据分类不属于数据预处理方法。"},{"type":"theory","set":1,"section":"单项选择题","number":13,"content":"人工智能训练师在训练模型时通常使用合成数据、随机生成数据和真实世界数据等多种类型的数据集。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"人工智能训练师在训练模型时通常使用合成数据、随机生成数据和真实世界数据等多种类型的数据集。"},{"type":"theory","set":1,"section":"单项选择题","number":14,"content":"交叉验证的主要作用是增加模型的泛化能力。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"交叉验证的主要作用是增加模型的泛化能力。"},{"type":"theory","set":1,"section":"单项选择题","number":15,"content":"在机器学习中，过拟合是指模型在新数据上表现不佳。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在机器学习中，过拟合是指模型在新数据上表现不佳。"},{"type":"theory","set":1,"section":"单项选择题","number":16,"content":"决策树不是深度学习模型的组成部分。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"决策树不是深度学习模型的组成部分。"},{"type":"theory","set":1,"section":"单项选择题","number":17,"content":"在处理不平衡数据集时通常采取增加数据量、调整分类阈值和重新采样等策略。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在处理不平衡数据集时通常采取增加数据量、调整分类阈值和重新采样等策略。"},{"type":"theory","set":1,"section":"单项选择题","number":18,"content":"准确率、召回率和F1分数等指标常用于评估分类模型的性能。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"准确率、召回率和f1分数等指标常用于评估分类模型的性能。"},{"type":"theory","set":1,"section":"单项选择题","number":19,"content":"在机器学习中，特征选择的目的是减少模型的复杂度。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在机器学习中，特征选择的目的是减少模型的复杂度。"},{"type":"theory","set":1,"section":"单项选择题","number":20,"content":"逻辑回归不是用于回归问题的算法（逻辑回归用于分类问题）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"逻辑回归不是用于回归问题的算法（逻辑回归用于分类问题）。"},{"type":"theory","set":1,"section":"单项选择题","number":21,"content":"在机器学习中，随机森林是一种集成学习方法。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在机器学习中，随机森林是一种集成学习方法。"},{"type":"theory","set":1,"section":"单项选择题","number":22,"content":"决策树不是神经网络中的激活函数。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"决策树不是神经网络中的激活函数。"},{"type":"theory","set":1,"section":"单项选择题","number":23,"content":"在智能训练中，数据标注的目的是为机器学习模型提供训练信息。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在智能训练中，数据标注的目的是为机器学习模型提供训练信息。"},{"type":"theory","set":1,"section":"单项选择题","number":24,"content":"数据压缩不是智能训练中常用的数据增强技术。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据压缩不是智能训练中常用的数据增强技术。"},{"type":"theory","set":1,"section":"单项选择题","number":25,"content":"增加图像的噪声不属于数字图像处理的目的。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"增加图像的噪声不属于数字图像处理的目的。"},{"type":"theory","set":1,"section":"单项选择题","number":26,"content":"ETL 不仅仅是对一个企业部门、一个应用系统数据的简单整理，还是跨部门、跨系统的数据整合处理。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"etl 不仅仅是对一个企业部门、一个应用系统数据的简单整理，还是跨部门、跨系统的数据整合处理。"},{"type":"theory","set":1,"section":"单项选择题","number":27,"content":"ETL常用工具Kettle的适用场景为用于数据备份、容灾。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"etl常用工具kettle的适用场景为用于数据备份、容灾。"},{"type":"theory","set":1,"section":"单项选择题","number":28,"content":"ETL数据整合的主流工具Kettle对数据库无侵入性。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"etl数据整合的主流工具kettle对数据库无侵入性。"},{"type":"theory","set":1,"section":"单项选择题","number":29,"content":"ETL数据整合的主流工具中不需要开发的为Kettle。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"etl数据整合的主流工具中不需要开发的为kettle。"},{"type":"theory","set":1,"section":"单项选择题","number":30,"content":"转换组件是针对数据记录进行处理组件，是以每个记录为处理对象，使用某种处理方法的组件。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"转换组件是针对数据记录进行处理组件，是以每个记录为处理对象，使用某种处理方法的组件。"},{"type":"theory","set":1,"section":"单项选择题","number":31,"content":"用来读取不同文本文件中的数据，大多是符合约定格式的TXT文件的组件名称为文本文件输入。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"用来读取不同文本文件中的数据，大多是符合约定格式的txt文件的组件名称为文本文件输入。"},{"type":"theory","set":1,"section":"单项选择题","number":32,"content":"仅对成功的信息发出提示不属于ETL任务执行的主要内容。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"仅对成功的信息发出提示不属于etl任务执行的主要内容。"},{"type":"theory","set":1,"section":"单项选择题","number":33,"content":"网络爬虫是一种按照一定规则，自动地抓取网页信息的程序。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"网络爬虫是一种按照一定规则，自动地抓取网页信息的程序。"},{"type":"theory","set":1,"section":"单项选择题","number":34,"content":"数据整合建立转换工程是在Kettle中最先进行操作的。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据整合建立转换工程是在kettle中最先进行操作的。"},{"type":"theory","set":1,"section":"单项选择题","number":35,"content":"清洗不属于数据整合过程（ETL过程为抽取、转换、装载）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"清洗不属于数据整合过程（etl过程为抽取、转换、装载）。"},{"type":"theory","set":1,"section":"单项选择题","number":36,"content":"数据整合的转换过程主要是针对数据的各种处理。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据整合的转换过程主要是针对数据的各种处理。"},{"type":"theory","set":1,"section":"单项选择题","number":37,"content":"局部性不属于衡量数据质量的指标。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"局部性不属于衡量数据质量的指标。"},{"type":"theory","set":1,"section":"单项选择题","number":38,"content":"数据清洗是指发现并纠正数据文件中可识别的错误，包括检查数据的一致性、处理无效值等。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据清洗是指发现并纠正数据文件中可识别的错误，包括检查数据的一致性、处理无效值等。"},{"type":"theory","set":1,"section":"单项选择题","number":39,"content":"在各种数据清洗异常中，语法类异常是指表示实体的具体数据的值和格式的错误。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在各种数据清洗异常中，语法类异常是指表示实体的具体数据的值和格式的错误。"},{"type":"theory","set":1,"section":"单项选择题","number":40,"content":"在数据预处理过程中，删除当前字段不是对缺失值的正确处理方法。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在数据预处理过程中，删除当前字段不是对缺失值的正确处理方法。"},{"type":"theory","set":1,"section":"单项选择题","number":41,"content":"噪声数据处理过程中，分箱是通过考察数据的周围值来光滑有序的数据值。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"噪声数据处理过程中，分箱是通过考察数据的周围值来光滑有序的数据值。"},{"type":"theory","set":1,"section":"单项选择题","number":42,"content":"数据特征归约的原则是在保留数据判别能力的同时减少特征向量的维度。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据特征归约的原则是在保留数据判别能力的同时减少特征向量的维度。"},{"type":"theory","set":1,"section":"单项选择题","number":43,"content":"数据归约是指在尽可能保持数据原貌的前提下，最大限度地精简数据量，样本规约就是从数据集中挑选出一个有代表性的样本子集。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据归约是指在尽可能保持数据原貌的前提下，最大限度地精简数据量，样本规约就是从数据集中挑选出一个有代表性的样本子集。"},{"type":"theory","set":1,"section":"单项选择题","number":44,"content":"数据归约是指在尽可能保持数据原貌的前提下，最大限度地精简数据量，特征值规约就是特征值离散化技术。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据归约是指在尽可能保持数据原貌的前提下，最大限度地精简数据量，特征值规约就是特征值离散化技术。"},{"type":"theory","set":1,"section":"单项选择题","number":45,"content":"在数据变化过程中，数据平滑是指去除数据中的噪声，可采用分箱的方式进行数据平滑。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在数据变化过程中，数据平滑是指去除数据中的噪声，可采用分箱的方式进行数据平滑。"},{"type":"theory","set":1,"section":"单项选择题","number":46,"content":"剪枝是决策树学习算法对付过拟合的主要手段。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"剪枝是决策树学习算法对付过拟合的主要手段。"},{"type":"theory","set":1,"section":"单项选择题","number":47,"content":"结构复杂不属于大数据技术设计的特征。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"结构复杂不属于大数据技术设计的特征。"},{"type":"theory","set":1,"section":"单项选择题","number":48,"content":"在大数据线下采集过程中，通过使用传感器来测试物品的温度、湿度和电压来获取数据。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在大数据线下采集过程中，通过使用传感器来测试物品的温度、湿度和电压来获取数据。"},{"type":"theory","set":1,"section":"单项选择题","number":49,"content":"在大数据处理过程中，目前主流的数据处理模式是批处理模式和流处理模式。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"在大数据处理过程中，目前主流的数据处理模式是批处理模式和流处理模式。"},{"type":"theory","set":1,"section":"单项选择题","number":50,"content":"数据采集系统通常包括数据生成、数据采集、数据处理、数据存储四个部分。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据采集系统通常包括数据生成、数据采集、数据处理、数据存储四个部分。"},{"type":"theory","set":1,"section":"单项选择题","number":51,"content":"压缩矩阵不属于混合精度训练时避免精度损失的方法。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"压缩矩阵不属于混合精度训练时避免精度损失的方法。"},{"type":"theory","set":1,"section":"单项选择题","number":52,"content":"业务流程优化的目的是通过不断发展、完善、优化业务。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"业务流程优化的目的是通过不断发展、完善、优化业务。"},{"type":"theory","set":1,"section":"单项选择题","number":53,"content":"层层汇报和流程优化方法无关。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"层层汇报和流程优化方法无关。"},{"type":"theory","set":1,"section":"单项选择题","number":54,"content":"供货周期短不属于业务流程优化的核心问题。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"供货周期短不属于业务流程优化的核心问题。"},{"type":"theory","set":1,"section":"单项选择题","number":55,"content":"保持业务流程不变不属于业务流程优化的解决方案。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"保持业务流程不变不属于业务流程优化的解决方案。"},{"type":"theory","set":1,"section":"单项选择题","number":56,"content":"数据分析不属于数据标注的基本流程（数据标注基本流程包含数据采集、数据清洗、数据标注等）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据分析不属于数据标注的基本流程（数据标注基本流程包含数据采集、数据清洗、数据标注等）。"},{"type":"theory","set":1,"section":"单项选择题","number":57,"content":"多人验证是常用的数据质检方法，即多人做同一个子任务，通过数据标注工具的功能自动或人工辅助选择出最优的标准结果。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"多人验证是常用的数据质检方法，即多人做同一个子任务，通过数据标注工具的功能自动或人工辅助选择出最优的标准结果。"},{"type":"theory","set":1,"section":"单项选择题","number":58,"content":"文本标注主要是用于自然语言处理。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"文本标注主要是用于自然语言处理。"},{"type":"theory","set":1,"section":"单项选择题","number":59,"content":"人脸识别属于图像标注的应用场景。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"人脸识别属于图像标注的应用场景。"},{"type":"theory","set":1,"section":"单项选择题","number":60,"content":"机器标注不属于标注的构成形式（标注的构成形式包括结构化标注、非结构化标注和半结构化标注）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"机器标注不属于标注的构成形式（标注的构成形式包括结构化标注、非结构化标注和半结构化标注）。"},{"type":"theory","set":1,"section":"单项选择题","number":61,"content":"标注者类型分为人工标注和机器标注。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"标注者类型分为人工标注和机器标注。"},{"type":"theory","set":1,"section":"单项选择题","number":62,"content":"人工标注的特点是标注质量高。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"人工标注的特点是标注质量高。"},{"type":"theory","set":1,"section":"单项选择题","number":63,"content":"不需要进行数据清洗即可进入数据标注环节的叙述是错误的（数据标注前需要进行数据清洗）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"不需要进行数据清洗即可进入数据标注环节的叙述是错误的（数据标注前需要进行数据清洗）。"},{"type":"theory","set":1,"section":"单项选择题","number":64,"content":"数据标注需求的量大不属于数据标注的特点（数据标注的特点包括内容颗粒度小、需求不统一、需求迭代快）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据标注需求的量大不属于数据标注的特点（数据标注的特点包括内容颗粒度小、需求不统一、需求迭代快）。"},{"type":"theory","set":1,"section":"单项选择题","number":65,"content":"目前，提高数据标注效率的最好方式是对待标注数据进行预处理。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"目前，提高数据标注效率的最好方式是对待标注数据进行预处理。"},{"type":"theory","set":1,"section":"单项选择题","number":66,"content":"数据具有保密性不属于产生多种数据采集方式与处理方式的原因。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据具有保密性不属于产生多种数据采集方式与处理方式的原因。"},{"type":"theory","set":1,"section":"单项选择题","number":67,"content":"等宽法不属于标准化的方法（等宽法是离散化方法，标准化方法包括离差标准化、标准差标准化、函数变换等）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"等宽法不属于标准化的方法（等宽法是离散化方法，标准化方法包括离差标准化、标准差标准化、函数变换等）。"},{"type":"theory","set":1,"section":"单项选择题","number":68,"content":"数据标注不属于数据预处理方法（数据预处理方法包括数据清洗、数据合并、数据变换等）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据标注不属于数据预处理方法（数据预处理方法包括数据清洗、数据合并、数据变换等）。"},{"type":"theory","set":1,"section":"单项选择题","number":69,"content":"数据标注不属于缺失值的常见处理方法（缺失值的常见处理方法包括删除、数据插补、数据变换等）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据标注不属于缺失值的常见处理方法（缺失值的常见处理方法包括删除、数据插补、数据变换等）。"},{"type":"theory","set":1,"section":"单项选择题","number":70,"content":"根据数据量的大小进行划分不属于数据标注常见的规则。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"根据数据量的大小进行划分不属于数据标注常见的规则。"},{"type":"theory","set":1,"section":"多项选择题","number":1,"content":"《著作权法》、《专利法》和《商标法》属于知识产权法律。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"《著作权法》、《专利法》和《商标法》属于知识产权法律。"},{"type":"theory","set":1,"section":"多项选择题","number":2,"content":"Protools、Logic、Adobe Audition和GoldWare是常用的语音处理工具。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"protools、logic、adobe audition和goldware是常用的语音处理工具。"},{"type":"theory","set":1,"section":"多项选择题","number":3,"content":"文本标注的现实应用场景主要包括文本的实体标注、情感标注、敏感信息标注和相似性判断标注。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"文本标注的现实应用场景主要包括文本的实体标注、情感标注、敏感信息标注和相似性判断标注。"},{"type":"theory","set":1,"section":"多项选择题","number":4,"content":"图像处理的流程是指对图像进行采集、显示、存储、通信和处理等模块分析。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"图像处理的流程是指对图像进行采集、显示、存储、通信和处理等模块分析。"},{"type":"theory","set":1,"section":"多项选择题","number":5,"content":"视频标注源视频做结构化处理，包括镜头检测、分割和关键帧提取。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"视频标注源视频做结构化处理，包括镜头检测、分割和关键帧提取。"},{"type":"theory","set":1,"section":"多项选择题","number":6,"content":"当标注对象作为分类基础时，可以将数据标注细化为图像数据标注、文本数据标注、语音数据标注和视频数据标注。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"当标注对象作为分类基础时，可以将数据标注细化为图像数据标注、文本数据标注、语音数据标注和视频数据标注。"},{"type":"theory","set":1,"section":"多项选择题","number":7,"content":"文本数据标注在生活中的应用比较广泛，主要包括名片自动识别和证照识别。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"文本数据标注在生活中的应用比较广泛，主要包括名片自动识别和证照识别。"},{"type":"theory","set":1,"section":"多项选择题","number":8,"content":"Praat是主要的语音数据标注工具。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"praat是主要的语音数据标注工具。"},{"type":"theory","set":1,"section":"多项选择题","number":9,"content":"常见的数据标注类型包括文本标注、语音标注、图像标注和视频标注。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"常见的数据标注类型包括文本标注、语音标注、图像标注和视频标注。"},{"type":"theory","set":1,"section":"多项选择题","number":10,"content":"CSV 格式的文件中，每条记录占一行；若字段中包含逗号，则该字段必须用双引号括起来；若字段中包含双引号，则该字段必须用双引号括起来。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"csv 格式的文件中，每条记录占一行；若字段中包含逗号，则该字段必须用双引号括起来；若字段中包含双引号，则该字段必须用双引号括起来。"},{"type":"theory","set":1,"section":"判断题","number":1,"content":"欧式距离是计算欧氏空间中两点之间的距离。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"欧式距离是计算欧氏空间中两点之间的距离。"},{"type":"theory","set":1,"section":"判断题","number":2,"content":"数据分析是有组织有目的地收集数据、分析数据，使之成为信息的过程。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据分析是有组织有目的地收集数据、分析数据，使之成为信息的过程。"},{"type":"theory","set":1,"section":"判断题","number":3,"content":"管理者识别需求要利用信息支持评审过程输入、过程输出、资源配置的合理性、过程活动的优化方案和过程异常变异的发现。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"管理者识别需求要利用信息支持评审过程输入、过程输出、资源配置的合理性、过程活动的优化方案和过程异常变异的发现。"},{"type":"theory","set":1,"section":"判断题","number":4,"content":"数据分析模型优化目标函数是使全局损失函数最小化，而非最大化。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"数据分析模型优化目标函数是使全局损失函数最小化，而非最大化。"},{"type":"theory","set":1,"section":"判断题","number":5,"content":"K折交叉验证需要将数据集分成k个互不相交的大小相同的数据集。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"k折交叉验证需要将数据集分成k个互不相交的大小相同的数据集。"},{"type":"theory","set":1,"section":"判断题","number":6,"content":"两个变量的变化趋势相反时，两个变量之间的协方差是负值，而非正值。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"两个变量的变化趋势相反时，两个变量之间的协方差是负值，而非正值。"},{"type":"theory","set":1,"section":"判断题","number":7,"content":"标准差能反映一个数据集的离散程度。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"标准差能反映一个数据集的离散程度。"},{"type":"theory","set":1,"section":"判断题","number":8,"content":"参数估计希望用较少的样本去描述数据的总体分布，但需要事先知道样本的总体分布（或假定其分布形式）。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"参数估计希望用较少的样本去描述数据的总体分布，但需要事先知道样本的总体分布（或假定其分布形式）。"},{"type":"theory","set":1,"section":"判断题","number":8,"content":"线性回归包括简单线性回归和多元线性回归。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"线性回归包括简单线性回归和多元线性回归。"},{"type":"theory","set":1,"section":"判断题","number":10,"content":"逻辑回归主要解决分类问题，是一种预测分类的方法。","source":"1-人工智能训练师三级-理论知识复习资料01","search_text":"逻辑回归主要解决分类问题，是一种预测分类的方法。"},{"type":"theory","set":2,"section":"单项选择题","number":1,"content":"朱熹指出的\"专心致志，以事其业\"说的是敬业精神。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"朱熹指出的\"专心致志，以事其业\"说的是敬业精神。"},{"type":"theory","set":2,"section":"单项选择题","number":2,"content":"关于团结互助、加强协作，正确的表述是正确处理竞争与合作的关系。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"关于团结互助、加强协作，正确的表述是正确处理竞争与合作的关系。"},{"type":"theory","set":2,"section":"单项选择题","number":3,"content":"关于道德与法律的区别，表述不正确的是法律由国家强制力（法律由国家强制力是正确表述，不是区别）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"关于道德与法律的区别，表述不正确的是法律由国家强制力（法律由国家强制力是正确表述，不是区别）。"},{"type":"theory","set":2,"section":"单项选择题","number":4,"content":"视频标注是由图像连续播放组成的数据标注类型。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"视频标注是由图像连续播放组成的数据标注类型。"},{"type":"theory","set":2,"section":"单项选择题","number":5,"content":"图像标注要求标注人员使用不同的颜色对不同的目标标记物进行轮廓识别，然后给相应的轮廓打上标签，用标签来概述轮廓内的内容。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"图像标注要求标注人员使用不同的颜色对不同的目标标记物进行轮廓识别，然后给相应的轮廓打上标签，用标签来概述轮廓内的内容。"},{"type":"theory","set":2,"section":"单项选择题","number":6,"content":"文本标注是指根据一定的标注或准则对文字内容进行诸如分词、语义判断、词性标注、文本翻译等注释工作。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"文本标注是指根据一定的标注或准则对文字内容进行诸如分词、语义判断、词性标注、文本翻译等注释工作。"},{"type":"theory","set":2,"section":"单项选择题","number":7,"content":"语音标注是指通过算法模型识别转录后的文本内容，并将其与对应的音频进行逻辑关联。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"语音标注是指通过算法模型识别转录后的文本内容，并将其与对应的音频进行逻辑关联。"},{"type":"theory","set":2,"section":"单项选择题","number":8,"content":"图像标注的质量好坏取决于轮廓线的判定准确性。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"图像标注的质量好坏取决于轮廓线的判定准确性。"},{"type":"theory","set":2,"section":"单项选择题","number":9,"content":"马氏距离不是机器学习中的评估指标。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"马氏距离不是机器学习中的评估指标。"},{"type":"theory","set":2,"section":"单项选择题","number":10,"content":"判断数据标注的质量主要体现在标注数量和标注内容质量。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"判断数据标注的质量主要体现在标注数量和标注内容质量。"},{"type":"theory","set":2,"section":"单项选择题","number":11,"content":"算法制定测试计划的目的是为测试的各项活动制定一个系统的、综合的计划，包括每项测试活动的对象、范围、方法、进度和预期结果。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法制定测试计划的目的是为测试的各项活动制定一个系统的、综合的计划，包括每项测试活动的对象、范围、方法、进度和预期结果。"},{"type":"theory","set":2,"section":"单项选择题","number":12,"content":"人工智能训练师在模型部署后通常关注模型的准确性、模型的性能监控和模型的可解释性。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"人工智能训练师在模型部署后通常关注模型的准确性、模型的性能监控和模型的可解释性。"},{"type":"theory","set":2,"section":"单项选择题","number":13,"content":"测试集准备只是随机的选取测试数据，容易造成测试结果的失真，降低算法模型评估结果的可靠性，这是因为忽略了测试的覆盖度。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"测试集准备只是随机的选取测试数据，容易造成测试结果的失真，降低算法模型评估结果的可靠性，这是因为忽略了测试的覆盖度。"},{"type":"theory","set":2,"section":"单项选择题","number":14,"content":"软件测试可以降低软件质量风险，使程序员能够更专心于解决程序的算法和效率。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"软件测试可以降低软件质量风险，使程序员能够更专心于解决程序的算法和效率。"},{"type":"theory","set":2,"section":"单项选择题","number":15,"content":"聚类算法较为复杂，需要评估其聚类结果中同类成员间的相似性等。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"聚类算法较为复杂，需要评估其聚类结果中同类成员间的相似性等。"},{"type":"theory","set":2,"section":"单项选择题","number":16,"content":"检测算法的核心是分类。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"检测算法的核心是分类。"},{"type":"theory","set":2,"section":"单项选择题","number":17,"content":"准确率是分类模型正确分类的样本数与样本总数的比值。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"准确率是分类模型正确分类的样本数与样本总数的比值。"},{"type":"theory","set":2,"section":"单项选择题","number":18,"content":"保留法将样本按照一定比例划分为训练集与检验集两个集合，两个集合中样本随机分配且不重叠。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"保留法将样本按照一定比例划分为训练集与检验集两个集合，两个集合中样本随机分配且不重叠。"},{"type":"theory","set":2,"section":"单项选择题","number":19,"content":"最好使用He来初始化ReLU激活函数。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"最好使用he来初始化relu激活函数。"},{"type":"theory","set":2,"section":"单项选择题","number":20,"content":"算法程序对于精心设计、极其刁难的测试数据无法满足要求的输出结果不属于算法的正确性。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法程序对于精心设计、极其刁难的测试数据无法满足要求的输出结果不属于算法的正确性。"},{"type":"theory","set":2,"section":"单项选择题","number":21,"content":"算法的每一步骤都能有效的执行，并得到确定的结果，称为算法的可行性。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法的每一步骤都能有效的执行，并得到确定的结果，称为算法的可行性。"},{"type":"theory","set":2,"section":"单项选择题","number":22,"content":"算法有一个初始输入，它给出最原始的条件，并且有一个最终的算法输出，它给出算法的目标，同时每个算法需有一个算法名。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法有一个初始输入，它给出最原始的条件，并且有一个最终的算法输出，它给出算法的目标，同时每个算法需有一个算法名。"},{"type":"theory","set":2,"section":"单项选择题","number":23,"content":"决策层不是深度学习模型中的层类型（深度学习模型层类型包括卷积层、池化层、全连接层等）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"决策层不是深度学习模型中的层类型（深度学习模型层类型包括卷积层、池化层、全连接层等）。"},{"type":"theory","set":2,"section":"单项选择题","number":24,"content":"在智能训练中，模型的复杂性不是模型部署的考虑因素（模型部署考虑因素包括模型的准确性、响应时间、可解释性等）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"在智能训练中，模型的复杂性不是模型部署的考虑因素（模型部署考虑因素包括模型的准确性、响应时间、可解释性等）。"},{"type":"theory","set":2,"section":"单项选择题","number":25,"content":"算法是指解题方案的准确而完整的描述，是一系列解决问题的清晰指令，代表着用系统的方法描述解决问题的策略机制。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法是指解题方案的准确而完整的描述，是一系列解决问题的清晰指令，代表着用系统的方法描述解决问题的策略机制。"},{"type":"theory","set":2,"section":"单项选择题","number":26,"content":"增加模型复杂性不是迁移学习的优点（迁移学习的优点包括减少训练数据需求、加速模型训练过程、提高模型泛化能力）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"增加模型复杂性不是迁移学习的优点（迁移学习的优点包括减少训练数据需求、加速模型训练过程、提高模型泛化能力）。"},{"type":"theory","set":2,"section":"单项选择题","number":27,"content":"模型估计不会影响机器学习模型的建立（缺失数据、过度训练、过度调优会影响模型建立）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"模型估计不会影响机器学习模型的建立（缺失数据、过度训练、过度调优会影响模型建立）。"},{"type":"theory","set":2,"section":"单项选择题","number":28,"content":"文本可视化可以将文本中的隐藏信息展示出来。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"文本可视化可以将文本中的隐藏信息展示出来。"},{"type":"theory","set":2,"section":"单项选择题","number":29,"content":"在智能训练中，模型输出的随机性分析不是模型解释性的方法（模型解释性方法包括特征重要性分析、可视化技术、模型内部结构分析等）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"在智能训练中，模型输出的随机性分析不是模型解释性的方法（模型解释性方法包括特征重要性分析、可视化技术、模型内部结构分析等）。"},{"type":"theory","set":2,"section":"单项选择题","number":30,"content":"惩罚不是强化学习中的组件（强化学习组件包括状态、动作、奖励等）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"惩罚不是强化学习中的组件（强化学习组件包括状态、动作、奖励等）。"},{"type":"theory","set":2,"section":"单项选择题","number":31,"content":"某算法的时间复杂度O(n²)，表面该算法的执行时间与n²成正比。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"某算法的时间复杂度o(n²)，表面该算法的执行时间与n²成正比。"},{"type":"theory","set":2,"section":"单项选择题","number":32,"content":"算法复杂性分析主要是针对运行该算法所需要的计算机资源的多少。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法复杂性分析主要是针对运行该算法所需要的计算机资源的多少。"},{"type":"theory","set":2,"section":"单项选择题","number":33,"content":"在智能训练中，增加模型复杂性不是模型优化的目标（模型优化目标包括提高模型准确性、减少模型训练时间、提高模型泛化能力）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"在智能训练中，增加模型复杂性不是模型优化的目标（模型优化目标包括提高模型准确性、减少模型训练时间、提高模型泛化能力）。"},{"type":"theory","set":2,"section":"单项选择题","number":34,"content":"基准是模型效果比较的参考点，量化模型的最低预期指标。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"基准是模型效果比较的参考点，量化模型的最低预期指标。"},{"type":"theory","set":2,"section":"单项选择题","number":35,"content":"分类算法中训练误差代表此分类方法对于现有训练样本集的拟合程度。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"分类算法中训练误差代表此分类方法对于现有训练样本集的拟合程度。"},{"type":"theory","set":2,"section":"单项选择题","number":36,"content":"一共检测了30个模型，有两类A，B。假设检测到了A类15个，但15张图中A类真实存在的数目是10个。这时候A类的精确率为66.70%（10/15）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"一共检测了30个模型，有两类a，b。假设检测到了a类15个，但15张图中a类真实存在的数目是10个。这时候a类的精确率为66.70%（10/15）。"},{"type":"theory","set":2,"section":"单项选择题","number":37,"content":"学习率控制每次更新参数的幅度，是比较重要的模型超参，过高和过低的学习率都可能对模型结果带来不良影响。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"学习率控制每次更新参数的幅度，是比较重要的模型超参，过高和过低的学习率都可能对模型结果带来不良影响。"},{"type":"theory","set":2,"section":"单项选择题","number":38,"content":"过拟合是指模型在训练集上预测效果好，而在测试集上预测性能较差，即在训练过程中误差很小，而在实际应用中误差很大。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"过拟合是指模型在训练集上预测效果好，而在测试集上预测性能较差，即在训练过程中误差很小，而在实际应用中误差很大。"},{"type":"theory","set":2,"section":"单项选择题","number":39,"content":"随机搜索是给每个超参数定义一个边缘分布，从指定的分布中随机选取固定数量的超参数进行组合。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"随机搜索是给每个超参数定义一个边缘分布，从指定的分布中随机选取固定数量的超参数进行组合。"},{"type":"theory","set":2,"section":"单项选择题","number":40,"content":"聚类分析的度量指标用于对聚类结果进行评判，分为外部指标和内部指标。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"聚类分析的度量指标用于对聚类结果进行评判，分为外部指标和内部指标。"},{"type":"theory","set":2,"section":"单项选择题","number":41,"content":"内部指标是指不借助任何外部参考，只用参与聚类的样本评判聚类结果的好坏。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"内部指标是指不借助任何外部参考，只用参与聚类的样本评判聚类结果的好坏。"},{"type":"theory","set":2,"section":"单项选择题","number":42,"content":"定性数据中表现为类别，但不区分顺序的是定类数据，比如性别、品牌等。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"定性数据中表现为类别，但不区分顺序的是定类数据，比如性别、品牌等。"},{"type":"theory","set":2,"section":"单项选择题","number":43,"content":"算法数据的分析方法中作图法可以最醒目地表达各个物理量间的变化关系。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"算法数据的分析方法中作图法可以最醒目地表达各个物理量间的变化关系。"},{"type":"theory","set":2,"section":"单项选择题","number":44,"content":"训练误差中求平方损失参数，就是对所有样本的误差求平方和。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"训练误差中求平方损失参数，就是对所有样本的误差求平方和。"},{"type":"theory","set":2,"section":"单项选择题","number":45,"content":"K折交叉验证将数据切分为k个互不相交的大小相同数据集，用k-1个子集训练。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"k折交叉验证将数据切分为k个互不相交的大小相同数据集，用k-1个子集训练。"},{"type":"theory","set":2,"section":"单项选择题","number":46,"content":"如果两个变量的变化趋势一致，也就是说如果其中一个大于自身的期望值时另外一个也大于自身的期望值，那么两个变量之间的协方差就是正值。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"如果两个变量的变化趋势一致，也就是说如果其中一个大于自身的期望值时另外一个也大于自身的期望值，那么两个变量之间的协方差就是正值。"},{"type":"theory","set":2,"section":"单项选择题","number":47,"content":"在智能系统设计中，需求分析步骤是确定系统需求的。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"在智能系统设计中，需求分析步骤是确定系统需求的。"},{"type":"theory","set":2,"section":"单项选择题","number":48,"content":"参数估计中估计量的含义是指用来估计总体参数的统计量的名称。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"参数估计中估计量的含义是指用来估计总体参数的统计量的名称。"},{"type":"theory","set":2,"section":"单项选择题","number":49,"content":"线性回归是一种通过拟合自变量与因变量之间最佳线性关系，来预测目标变量的方法。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"线性回归是一种通过拟合自变量与因变量之间最佳线性关系，来预测目标变量的方法。"},{"type":"theory","set":2,"section":"单项选择题","number":50,"content":"逻辑回归主要解决分类问题。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"逻辑回归主要解决分类问题。"},{"type":"theory","set":2,"section":"单项选择题","number":51,"content":"统计分析中最常用的方法是对比分析法。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"统计分析中最常用的方法是对比分析法。"},{"type":"theory","set":2,"section":"单项选择题","number":52,"content":"数据分析法中，分组分析法按照多个维度将数据拆分为各种组合，并比较各组合之间的差异。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"数据分析法中，分组分析法按照多个维度将数据拆分为各种组合，并比较各组合之间的差异。"},{"type":"theory","set":2,"section":"单项选择题","number":53,"content":"预测分析法主要用于未知数据的判断和预测。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"预测分析法主要用于未知数据的判断和预测。"},{"type":"theory","set":2,"section":"单项选择题","number":54,"content":"漏斗分析法能够科学反映的用户行为状态，以及观察出从行为起点到终点中各阶段用户的转化率情况。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"漏斗分析法能够科学反映的用户行为状态，以及观察出从行为起点到终点中各阶段用户的转化率情况。"},{"type":"theory","set":2,"section":"单项选择题","number":55,"content":"AB测试分析法侧重于对比AB两组结构相似的样本。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"ab测试分析法侧重于对比ab两组结构相似的样本。"},{"type":"theory","set":2,"section":"单项选择题","number":56,"content":"统计学的实质就是根据样本的特征来推断总体的情况。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"统计学的实质就是根据样本的特征来推断总体的情况。"},{"type":"theory","set":2,"section":"单项选择题","number":57,"content":"卡方检验用于两个离散型变量之间。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"卡方检验用于两个离散型变量之间。"},{"type":"theory","set":2,"section":"单项选择题","number":58,"content":"泊松分布适合描述单位时间内随机事件发生的次数的概率分布。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"泊松分布适合描述单位时间内随机事件发生的次数的概率分布。"},{"type":"theory","set":2,"section":"单项选择题","number":59,"content":"在设计智能系统时，硬件层不是系统架构的关键组成部分（系统架构关键组成部分包括数据层、算法层、应用层等）。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"在设计智能系统时，硬件层不是系统架构的关键组成部分（系统架构关键组成部分包括数据层、算法层、应用层等）。"},{"type":"theory","set":2,"section":"单项选择题","number":60,"content":"盒中有a个红球，b个黑球，今随机地从中取出一个，观察其颜色后放回，并加上同色球 c 个，再从盒中第二次抽取一球，第二次抽出的是黑球的概率为b/(a+b)。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"盒中有a个红球，b个黑球，今随机地从中取出一个，观察其颜色后放回，并加上同色球 c 个，再从盒中第二次抽取一球，第二次抽出的是黑球的概率为b/(a+b)。"},{"type":"theory","set":2,"section":"单项选择题","number":61,"content":"平均数是反映数据集中趋势的一项指标。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"平均数是反映数据集中趋势的一项指标。"},{"type":"theory","set":2,"section":"单项选择题","number":62,"content":"概率论中方差用来度量随机变量和其数学期望（即均值）之间的偏离程度。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"概率论中方差用来度量随机变量和其数学期望（即均值）之间的偏离程度。"},{"type":"theory","set":2,"section":"单项选择题","number":63,"content":"特征提取强调通过特征转换的方式得到一组具有明显物理或统计意义的特征。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"特征提取强调通过特征转换的方式得到一组具有明显物理或统计意义的特征。"},{"type":"theory","set":2,"section":"单项选择题","number":64,"content":"如果要统计数据的平均水平，最适合的统计分析法是描述性统计分析。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"如果要统计数据的平均水平，最适合的统计分析法是描述性统计分析。"},{"type":"theory","set":2,"section":"单项选择题","number":65,"content":"研究某些变量之间是否存在一定的相关性需要采用探索性统计分析。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"研究某些变量之间是否存在一定的相关性需要采用探索性统计分析。"},{"type":"theory","set":2,"section":"单项选择题","number":66,"content":"总体分布是总体中所有个体在某个变量上观测值的频次分布。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"总体分布是总体中所有个体在某个变量上观测值的频次分布。"},{"type":"theory","set":2,"section":"单项选择题","number":67,"content":"小波分析法实质就是将原始信号表示为一组小波基的线性组合。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"小波分析法实质就是将原始信号表示为一组小波基的线性组合。"},{"type":"theory","set":2,"section":"单项选择题","number":68,"content":"条形图是用宽度相同的，条形的高度或长短来表示数据多少的图形。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"条形图是用宽度相同的，条形的高度或长短来表示数据多少的图形。"},{"type":"theory","set":2,"section":"单项选择题","number":69,"content":"长条图用来比较两个或以上的价值（不同时间或者不同条件），只有一个变量，通常利用于较小的数据集分析。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"长条图用来比较两个或以上的价值（不同时间或者不同条件），只有一个变量，通常利用于较小的数据集分析。"},{"type":"theory","set":2,"section":"单项选择题","number":70,"content":"人机交互界面的设计要包含用户对系统的理解，称之为心智模型，这是为了系统的可用性或者用户友好性。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"人机交互界面的设计要包含用户对系统的理解，称之为心智模型，这是为了系统的可用性或者用户友好性。"},{"type":"theory","set":2,"section":"多项选择题","number":1,"content":"不属于新的职业道德观念的核心理念是尽忠职守、公德意识、劳动技术、我行我素。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"不属于新的职业道德观念的核心理念是尽忠职守、公德意识、劳动技术、我行我素。"},{"type":"theory","set":2,"section":"多项选择题","number":2,"content":"一个完整的计算机系统是由硬件系统和软件系统组成。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"一个完整的计算机系统是由硬件系统和软件系统组成。"},{"type":"theory","set":2,"section":"多项选择题","number":3,"content":"操作系统的主要功能包括处理机管理、存储器管理、设备管理、文件管理和进程管理。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"操作系统的主要功能包括处理机管理、存储器管理、设备管理、文件管理和进程管理。"},{"type":"theory","set":2,"section":"多项选择题","number":4,"content":"网关的基本功能包括协议转换、数据重新分组、解析数据包和信息安全。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"网关的基本功能包括协议转换、数据重新分组、解析数据包和信息安全。"},{"type":"theory","set":2,"section":"多项选择题","number":5,"content":"关于计算机病毒，错误的描述是计算机病毒可以烧毁计算机的电子元件、计算机病毒是一种传染力极强的生物细菌、计算机病毒一旦产生便无法清除、计算机病毒不具备复制特性。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"关于计算机病毒，错误的描述是计算机病毒可以烧毁计算机的电子元件、计算机病毒是一种传染力极强的生物细菌、计算机病毒一旦产生便无法清除、计算机病毒不具备复制特性。"},{"type":"theory","set":2,"section":"多项选择题","number":6,"content":"在Oracle中，where、order by、select、update不是用于限制分组函数的返回值的子句。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"在oracle中，where、order by、select、update不是用于限制分组函数的返回值的子句。"},{"type":"theory","set":2,"section":"多项选择题","number":7,"content":"关于 DNS 服务器表述不正确的是 DNS服务器配置不需要配置客户端、建立某个分区的 DNS 服务器时只需要建立一个主 DNS 服务器、主 DNS 服务器需要启动named进程而辅DNS服务器不需要、DNS服务器的配置文件是rc.samba。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"关于 dns 服务器表述不正确的是 dns服务器配置不需要配置客户端、建立某个分区的 dns 服务器时只需要建立一个主 dns 服务器、主 dns 服务器需要启动named进程而辅dns服务器不需要、dns服务器的配置文件是rc.samba。"},{"type":"theory","set":2,"section":"多项选择题","number":8,"content":"计算机系统的软件故障可分为系统故障、程序故障、病毒故障和人为破坏。","source":"2-人工智能训练师三级-理论知识复习资料02","search_text":"计算机系统的软件故障可分为系统故障、程序故障、病毒故障和人为破坏。"},{"type":"theory","set":2,"section":"多项选择题","number":9,"content":"一个完整的微型计 ,"set":3,"section":"单项选择题","number":51,"content":"在优化推荐系统时，更换用户界面设计不是常用的方法（常用方法包括调整模型参数、增加训练数据、改进特征工程等）。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在优化推荐系统时，更换用户界面设计不是常用的方法（常用方法包括调整模型参数、增加训练数据、改进特征工程等）。"},{"type":"theory","set":3,"section":"单项选择题","number":52,"content":"特征值归约将连续的特征值离散化，使之成为少量的区间，每个区间映射到一个离散符号。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"特征值归约将连续的特征值离散化，使之成为少量的区间，每个区间映射到一个离散符号。"},{"type":"theory","set":3,"section":"单项选择题","number":53,"content":"数据变换是将数据从一种表示形式变换为适用于数据挖掘的另一种形式的过程。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据变换是将数据从一种表示形式变换为适用于数据挖掘的另一种形式的过程。"},{"type":"theory","set":3,"section":"单项选择题","number":54,"content":"预剪枝是指在决策树生成过程中，对每个结点在划分前先进行估计，若当前结点的划分不能带来决策树泛化性能提升，则停止划分并将当前结点标记为叶结点。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"预剪枝是指在决策树生成过程中，对每个结点在划分前先进行估计，若当前结点的划分不能带来决策树泛化性能提升，则停止划分并将当前结点标记为叶结点。"},{"type":"theory","set":3,"section":"单项选择题","number":55,"content":"数据采集系统可以从数据的质量、采集与处理流程的稳定性、采集与处理的性能等多个方面进行维护。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据采集系统可以从数据的质量、采集与处理流程的稳定性、采集与处理的性能等多个方面进行维护。"},{"type":"theory","set":3,"section":"单项选择题","number":56,"content":"线下采集指通过传感器、磁卡片、FRID 等装置或技术，获取用户的线下行为数据。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"线下采集指通过传感器、磁卡片、frid 等装置或技术，获取用户的线下行为数据。"},{"type":"theory","set":3,"section":"单项选择题","number":57,"content":"对静态数据的处理主要是先对原始用户的数据进行分块释义，然后通过不同的任务处理区来进行数据处理，并得出最终结论。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"对静态数据的处理主要是先对原始用户的数据进行分块释义，然后通过不同的任务处理区来进行数据处理，并得出最终结论。"},{"type":"theory","set":3,"section":"单项选择题","number":58,"content":"数据采集又称数据抽取，分为全量抽取和增量抽取。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据采集又称数据抽取，分为全量抽取和增量抽取。"},{"type":"theory","set":3,"section":"单项选择题","number":59,"content":"在处理推荐系统中的不平衡问题时，忽略不平衡问题不是常用的方法（常用方法包括重采样、使用合成数据、调整模型的损失函数等）。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在处理推荐系统中的不平衡问题时，忽略不平衡问题不是常用的方法（常用方法包括重采样、使用合成数据、调整模型的损失函数等）。"},{"type":"theory","set":3,"section":"单项选择题","number":60,"content":"需要关注推荐系统的实时性，以确保用户能够及时获得最新的推荐结果。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"需要关注推荐系统的实时性，以确保用户能够及时获得最新的推荐结果。"},{"type":"theory","set":3,"section":"单项选择题","number":61,"content":"流程优化是一项策略，通过不断发展、完善、优化业务流程保持企业的竞争优势。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"流程优化是一项策略，通过不断发展、完善、优化业务流程保持企业的竞争优势。"},{"type":"theory","set":3,"section":"单项选择题","number":62,"content":"对流程进行优化，首先需要对流程进行评估工作，对流程能力划分等级，核心级不属于流程等级（流程等级包括初始级、经验级、规范级等）。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"对流程进行优化，首先需要对流程进行评估工作，对流程能力划分等级，核心级不属于流程等级（流程等级包括初始级、经验级、规范级等）。"},{"type":"theory","set":3,"section":"单项选择题","number":63,"content":"在训练推荐系统时，增加模型的复杂度不是提高模型泛化能力的常用方法（常用方法包括使用正则化技术、使用交叉验证技术、增加训练数据的多样性等）。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在训练推荐系统时，增加模型的复杂度不是提高模型泛化能力的常用方法（常用方法包括使用正则化技术、使用交叉验证技术、增加训练数据的多样性等）。"},{"type":"theory","set":3,"section":"单项选择题","number":64,"content":"数据采集是整个数据采集标注基本流程的首要环节。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据采集是整个数据采集标注基本流程的首要环节。"},{"type":"theory","set":3,"section":"单项选择题","number":65,"content":"数据质检是提高数据输出准确率的重要环节。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据质检是提高数据输出准确率的重要环节。"},{"type":"theory","set":3,"section":"单项选择题","number":66,"content":"在训练推荐系统时，增加模型的训练轮次不是处理过拟合问题的常用方法（常用方法包括减少模型的复杂度、增加训练数据的多样性、使用早停法等）。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在训练推荐系统时，增加模型的训练轮次不是处理过拟合问题的常用方法（常用方法包括减少模型的复杂度、增加训练数据的多样性、使用早停法等）。"},{"type":"theory","set":3,"section":"单项选择题","number":67,"content":"需要对推荐系统进行A/B测试，以评估不同版本系统的性能差异。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"需要对推荐系统进行a/b测试，以评估不同版本系统的性能差异。"},{"type":"theory","set":3,"section":"单项选择题","number":68,"content":"数据标签必须在归档的标签候选集内。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据标签必须在归档的标签候选集内。"},{"type":"theory","set":3,"section":"单项选择题","number":69,"content":"机器标注通过智能算法进行标注。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"机器标注通过智能算法进行标注。"},{"type":"theory","set":3,"section":"单项选择题","number":70,"content":"在推荐系统中，基于用户投票的推荐不是常用的推荐算法（常用推荐算法包括基于内容的推荐、基于协同过滤的推荐、基于关联规则的推荐等）。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在推荐系统中，基于用户投票的推荐不是常用的推荐算法（常用推荐算法包括基于内容的推荐、基于协同过滤的推荐、基于关联规则的推荐等）。"},{"type":"theory","set":3,"section":"多项选择题","number":1,"content":"关于团结互助、加强协作，正确的表述是正确处理竞争与合作的关系和合作友爱。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"关于团结互助、加强协作，正确的表述是正确处理竞争与合作的关系和合作友爱。"},{"type":"theory","set":3,"section":"多项选择题","number":2,"content":"算法的特征有确定性、输入性、输出性和可行性。（算法具有有穷性而非无穷性）","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"算法的特征有确定性、输入性、输出性和可行性。（算法具有有穷性而非无穷性）"},{"type":"theory","set":3,"section":"多项选择题","number":3,"content":"算法正确性包括证明关于输入与输出之间关系的命题是正确的、证明最终的结果是确定的、证明算法中的公式及计算方法是正确的。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"算法正确性包括证明关于输入与输出之间关系的命题是正确的、证明最终的结果是确定的、证明算法中的公式及计算方法是正确的。"},{"type":"theory","set":3,"section":"多项选择题","number":4,"content":"测试用例的作用特性包括避免测试的盲目性、可维护性、可管理性、可评估性和测试工作量的评估。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"测试用例的作用特性包括避免测试的盲目性、可维护性、可管理性、可评估性和测试工作量的评估。"},{"type":"theory","set":3,"section":"多项选择题","number":5,"content":"模型评价包括评价结果、重审过程和确定下一步。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"模型评价包括评价结果、重审过程和确定下一步。"},{"type":"theory","set":3,"section":"多项选择题","number":6,"content":"算法优化是对算法的时间复杂度和空间复杂度性能进行优化。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"算法优化是对算法的时间复杂度和空间复杂度性能进行优化。"},{"type":"theory","set":3,"section":"多项选择题","number":7,"content":"算法分析是对算法的计算时间和存储空间进行定量分析。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"算法分析是对算法的计算时间和存储空间进行定量分析。"},{"type":"theory","set":3,"section":"多项选择题","number":8,"content":"可视化分析在数据建模的过程中，容易辨别出数据的分布、类别、异常，以及参数取值对模型性能的影响。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"可视化分析在数据建模的过程中，容易辨别出数据的分布、类别、异常，以及参数取值对模型性能的影响。"},{"type":"theory","set":3,"section":"多项选择题","number":9,"content":"可视化分析常用方法的三个层次为基础方法、交互方法和提升方法。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"可视化分析常用方法的三个层次为基础方法、交互方法和提升方法。"},{"type":"theory","set":3,"section":"多项选择题","number":10,"content":"属于算法可视化常用工具有WPS表格、Tableau、Python和Matlab。（Axure是原型设计工具，不属于算法可视化常用工具）","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"属于算法可视化常用工具有wps表格、tableau、python和matlab。（axure是原型设计工具，不属于算法可视化常用工具）"},{"type":"theory","set":3,"section":"判断题","number":1,"content":"噪声的振幅值并非越低越好，需要根据具体场景判断，一般录音室噪声控制在合理范围内即可。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"噪声的振幅值并非越低越好，需要根据具体场景判断，一般录音室噪声控制在合理范围内即可。"},{"type":"theory","set":3,"section":"判断题","number":2,"content":"在日常生活中的书籍、文档等资料都可以整合处理后变成语料库来进行使用。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在日常生活中的书籍、文档等资料都可以整合处理后变成语料库来进行使用。"},{"type":"theory","set":3,"section":"判断题","number":3,"content":"数字图像是指以二进制数字形式表示的二维图像，利用计算机图像技术以数字的形式来记录、处理和保存图像信息。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数字图像是指以二进制数字形式表示的二维图像，利用计算机图像技术以数字的形式来记录、处理和保存图像信息。"},{"type":"theory","set":3,"section":"判断题","number":4,"content":"视频标注和图像标注是不同的标注类型，视频标注涉及时间序列和连续帧，因此不能将视频标注统称为图像标注。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"视频标注和图像标注是不同的标注类型，视频标注涉及时间序列和连续帧，因此不能将视频标注统称为图像标注。"},{"type":"theory","set":3,"section":"判断题","number":5,"content":"物体检测是从图像中选出要检测的对象，并通过标框标注的方式将物体标注出来。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"物体检测是从图像中选出要检测的对象，并通过标框标注的方式将物体标注出来。"},{"type":"theory","set":3,"section":"判断题","number":6,"content":"文本数据标注需要遵循一定的质量标准。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"文本数据标注需要遵循一定的质量标准。"},{"type":"theory","set":3,"section":"判断题","number":7,"content":"语音数据标注质量评估算法主要有词错误率算法和句子错误率算法。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"语音数据标注质量评估算法主要有词错误率算法和句子错误率算法。"},{"type":"theory","set":3,"section":"判断题","number":8,"content":"数据标注员完成标注任务后，质检员不仅需要抽查，还需要进行全面的质量检测和评估，以确保标注质量。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据标注员完成标注任务后，质检员不仅需要抽查，还需要进行全面的质量检测和评估，以确保标注质量。"},{"type":"theory","set":3,"section":"判断题","number":9,"content":"数据在计算机中以二进制形式存储，并非以图像形式存储。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"数据在计算机中以二进制形式存储，并非以图像形式存储。"},{"type":"theory","set":3,"section":"判断题","number":10,"content":"在人工智能领域，评价数据质量的首要指标通常包括准确性、完整性、一致性等，关联度并非首要指标。","source":"3-人工智能训练师三级-理论知识复习资料03","search_text":"在人工智能领域，评价数据质量的首要指标通常包括准确性、完整性、一致性等，关联度并非首要指标。"},{"type":"theory","set":4,"section":"单项选择题","number":1,"content":"《公民道德建设实施纲要》明确提出，要大力提倡以爱岗敬业、诚实守信、办事公道、群众服务、奉献社会为主要内容的职业道德。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"《公民道德建设实施纲要》明确提出，要大力提倡以爱岗敬业、诚实守信、办事公道、群众服务、奉献社会为主要内容的职业道德。"},{"type":"theory","set":4,"section":"单项选择题","number":2,"content":"职业道德是一种内在的非强制性的约束机制。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"职业道德是一种内在的非强制性的约束机制。"},{"type":"theory","set":4,"section":"单项选择题","number":3,"content":"朱熹指出的\"专心致志，以事其业\"说的是敬业精神。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"朱熹指出的\"专心致志，以事其业\"说的是敬业精神。"},{"type":"theory","set":4,"section":"单项选择题","number":4,"content":"聚类算法较为复杂，需要评估其聚类结果中同类成员间的相似性等。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"聚类算法较为复杂，需要评估其聚类结果中同类成员间的相似性等。"},{"type":"theory","set":4,"section":"单项选择题","number":5,"content":"转换位于抽取和转换之间，进行具体数据处理。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"转换位于抽取和转换之间，进行具体数据处理。"},{"type":"theory","set":4,"section":"单项选择题","number":6,"content":"ETL数据整合的主流工具Kettle对数据库无侵入性。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"etl数据整合的主流工具kettle对数据库无侵入性。"},{"type":"theory","set":4,"section":"单项选择题","number":7,"content":"学习率控制每次更新参数的幅度，是比较重要的模型超参，过高和过低的学习率都可能对模型结果带来不良影响。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"学习率控制每次更新参数的幅度，是比较重要的模型超参，过高和过低的学习率都可能对模型结果带来不良影响。"},{"type":"theory","set":4,"section":"单项选择题","number":8,"content":"人工智能训练师在业务分析时，需要关注项目资源，因为合理的资源分配是项目成功的关键之一。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"人工智能训练师在业务分析时，需要关注项目资源，因为合理的资源分配是项目成功的关键之一。"},{"type":"theory","set":4,"section":"单项选择题","number":9,"content":"在数据变化过程中，数据平滑是指去除数据中的噪声，可采用分箱的方式进行数据平滑。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"在数据变化过程中，数据平滑是指去除数据中的噪声，可采用分箱的方式进行数据平滑。"},{"type":"theory","set":4,"section":"单项选择题","number":10,"content":"图像标注的质量好坏取决于轮廓线的判定准确性。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"图像标注的质量好坏取决于轮廓线的判定准确性。"},{"type":"theory","set":4,"section":"单项选择题","number":11,"content":"数据采集系统可以从数据的质量、采集与处理流程的稳定性、采集与处理的性能等多个方面进行维护。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"数据采集系统可以从数据的质量、采集与处理流程的稳定性、采集与处理的性能等多个方面进行维护。"},{"type":"theory","set":4,"section":"单项选择题","number":12,"content":"数据分类不属于数据预处理方法（数据预处理方法包括数据集成、数据变换、数据规约等）。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"数据分类不属于数据预处理方法（数据预处理方法包括数据集成、数据变换、数据规约等）。"},{"type":"theory","set":4,"section":"单项选择题","number":13,"content":"线性回归是一种通过拟合自变量与因变量之间最佳线性关系，来预测目标变量的方法。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"线性回归是一种通过拟合自变量与因变量之间最佳线性关系，来预测目标变量的方法。"},{"type":"theory","set":4,"section":"单项选择题","number":14,"content":"图像与灰度直方图的对应关系是多对一。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"图像与灰度直方图的对应关系是多对一。"},{"type":"theory","set":4,"section":"单项选择题","number":15,"content":"关于数据标注叙述错误的是：不需要进行数据清洗即可进入数据标注环节（数据标注前需要进行数据清洗）。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"关于数据标注叙述错误的是：不需要进行数据清洗即可进入数据标注环节（数据标注前需要进行数据清洗）。"},{"type":"theory","set":4,"section":"单项选择题","number":16,"content":"算法的每一步骤都能有效的执行，并得到确定的结果，称为算法的可行性。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"算法的每一步骤都能有效的执行，并得到确定的结果，称为算法的可行性。"},{"type":"theory","set":4,"section":"单项选择题","number":17,"content":"数据标签必须在归档的标签候选集内。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"数据标签必须在归档的标签候选集内。"},{"type":"theory","set":4,"section":"单项选择题","number":18,"content":"数据整合建立转换工程是在Kettle中最先进行操作的。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"数据整合建立转换工程是在kettle中最先进行操作的。"},{"type":"theory","set":4,"section":"单项选择题","number":19,"content":"统计学的实质就是根据样本的特征来推断总体的情况。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"统计学的实质就是根据样本的特征来推断总体的情况。"},{"type":"theory","set":4,"section":"单项选择题","number":20,"content":"人工智能训练师在进行业务分析时，应与业务部门共同讨论并设定模型的预期效果。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"人工智能训练师在进行业务分析时，应与业务部门共同讨论并设定模型的预期效果。"},{"type":"theory","set":4,"section":"单项选择题","number":21,"content":"结构复杂不属于大数据技术设计的特征（大数据技术设计特征包括负载均衡、分散处理、副本存储等）。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"结构复杂不属于大数据技术设计的特征（大数据技术设计特征包括负载均衡、分散处理、副本存储等）。"},{"type":"theory","set":4,"section":"单项选择题","number":22,"content":"算法复杂性分析主要是针对运行该算法所需要的计算机资源的多少。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"算法复杂性分析主要是针对运行该算法所需要的计算机资源的多少。"},{"type":"theory","set":4,"section":"单项选择题","number":23,"content":"流程优化是一项策略，通过不断发展、完善、优化业务流程保持企业的竞争优势。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"流程优化是一项策略，通过不断发展、完善、优化业务流程保持企业的竞争优势。"},{"type":"theory","set":4,"section":"单项选择题","number":24,"content":"在机器学习中，特征选择的目的是减少模型的复杂度。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"在机器学习中，特征选择的目的是减少模型的复杂度。"},{"type":"theory","set":4,"section":"单项选择题","number":25,"content":"训练误差中求平方损失参数，就是对所有样本的误差求平方和。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"训练误差中求平方损失参数，就是对所有样本的误差求平方和。"},{"type":"theory","set":4,"section":"单项选择题","number":26,"content":"Kettle的CDC机制是基于时间戳、触发器等。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"kettle的cdc机制是基于时间戳、触发器等。"},{"type":"theory","set":4,"section":"单项选择题","number":27,"content":"数据标注的分类可以从不同的维度进行，文本标注主要是用于自然语言处理。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"数据标注的分类可以从不同的维度进行，文本标注主要是用于自然语言处理。"},{"type":"theory","set":4,"section":"单项选择题","number":28,"content":"准确率是分类模型正确分类的样本数与样本总数的比值。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"准确率是分类模型正确分类的样本数与样本总数的比值。"},{"type":"theory","set":4,"section":"单项选择题","number":29,"content":"压缩比是用于衡量数据压缩技术性能优劣的重要指标。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"压缩比是用于衡量数据压缩技术性能优劣的重要指标。"},{"type":"theory","set":4,"section":"单项选择题","number":30,"content":"在各种数据清洗异常中，语法类异常是指表示实体的具体数据的值和格式的错误。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"在各种数据清洗异常中，语法类异常是指表示实体的具体数据的值和格式的错误。"},{"type":"theory","set":4,"section":"单项选择题","number":31,"content":"统计分析中最常用的方法是对比分析法。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"统计分析中最常用的方法是对比分析法。"},{"type":"theory","set":4,"section":"单项选择题","number":32,"content":"在业务分析中，需求分析环节对于确定人工智能训练师的工作范围至关重要。","source":"4-人工智能训练师三级-理论知识复习资料04","search_text":"在业务分析中，需求分析环节对于确定人工智能训练师的工作范围至关重要。"},{"type":"theory","set":4,"section":"单项选择题","number":33,"content":"在智能训练中，模型输
